<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Circular ring: 4 arcs with diagonal gaps -->
  <!-- Top arc (NW to NE, ~232° to 308°) -->
  <path d="M 50 35 A 82 82 0 0 1 150 35" stroke="#3D87E8" stroke-width="16" stroke-linecap="round"/>
  <!-- Right arc (NE to SE, ~322° to 38°) -->
  <path d="M 165 50 A 82 82 0 0 1 165 150" stroke="#3D87E8" stroke-width="16" stroke-linecap="round"/>
  <!-- Bottom arc (SE to SW, ~52° to 128°) -->
  <path d="M 150 165 A 82 82 0 0 1 50 165" stroke="#3D87E8" stroke-width="16" stroke-linecap="round"/>
  <!-- Left arc (SW to NW, ~142° to 218°) -->
  <path d="M 35 150 A 82 82 0 0 1 35 50" stroke="#3D87E8" stroke-width="16" stroke-linecap="round"/>

  <!-- Stylized M inside -->
  <!-- Outer M shape: arch from bottom-left to top-center to bottom-right -->
  <path d="M 52 158 C 52 110 70 46 100 42 C 130 46 148 110 148 158 L 132 158 C 132 118 116 66 100 62 C 84 66 68 118 68 158 Z" fill="#3D87E8"/>
  <!-- Inner valley cutout (white) creating the M legs -->
  <path d="M 68 158 L 84 106 C 90 90 100 104 100 104 C 100 104 110 90 116 106 L 132 158 L 118 158 L 104 114 C 102 108 100 111 100 111 C 100 111 98 108 96 114 L 82 158 Z" fill="white"/>
</svg>
