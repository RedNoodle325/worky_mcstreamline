<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Munters PM Dashboard</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="app">
    <nav id="sidebar">
      <div class="sidebar-header">
        <div class="logo">M</div>
        <span class="app-title">PM Dashboard</span>
      </div>
      <ul class="nav-links">
        <li><a href="#" data-page="dashboard" class="active">
          <span class="icon">⊞</span> Dashboard
        </a></li>
        <li><a href="#" data-page="sites">
          <span class="icon">⌂</span> Sites
        </a></li>
        <li><a href="#" data-page="units">
          <span class="icon">◧</span> Units
        </a></li>
        <li><a href="#" data-page="tickets">
          <span class="icon">⊟</span> Tickets
        </a></li>
        <li><a href="#" data-page="commissioning">
          <span class="icon">✓</span> Commissioning
        </a></li>
        <li><a href="#" data-page="contractors">
          <span class="icon">◈</span> Contractors
        </a></li>
        <li><a href="#" data-page="bom">
          <span class="icon">⊕</span> BOM / Parts
        </a></li>
        <li><a href="#" data-page="warranty">
          <span class="icon">⊛</span> Warranty
        </a></li>
      </ul>
    </nav>

    <main id="content">
      <div id="page-container">
        <!-- Pages load here -->
      </div>
    </main>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <div id="modal-header">
        <h2 id="modal-title"></h2>
        <button id="modal-close">&times;</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="/js/api.js"></script>
  <script src="/js/pages/dashboard.js"></script>
  <script src="/js/pages/sites.js"></script>
  <script src="/js/pages/units.js"></script>
  <script src="/js/pages/tickets.js"></script>
  <script src="/js/pages/commissioning.js"></script>
  <script src="/js/pages/contractors.js"></script>
  <script src="/js/pages/bom.js"></script>
  <script src="/js/pages/warranty.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
