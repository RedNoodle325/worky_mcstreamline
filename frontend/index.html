<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Munters PM Dashboard</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="read-only">
  <div id="app">
    <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Open menu">☰</button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <nav id="sidebar">
      <button class="sidebar-close-btn" id="sidebar-close-btn" aria-label="Close menu">&times;</button>
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <img src="/img/logos/munters.png" alt="Munters" style="height:28px;width:auto;max-width:140px;object-fit:contain;filter:brightness(0) invert(1)" onerror="this.style.display='none'">
        </div>
      </div>
      <ul class="nav-links">
        <li><a href="#" data-page="dashboard" class="active">
          <span class="icon">⊞</span> Dashboard
        </a></li>
        <li><a href="#" data-page="service-tickets">
          <span class="icon">🎫</span> CS Tickets
        </a></li>
        <li><a href="#" data-page="issues">
          <span class="icon">⚠</span> Issues
        </a></li>
        <li><a href="#" data-page="contacts">
          <span class="icon">◈</span> Contacts
        </a></li>
        <li><a href="#" data-page="notes">
          <span class="icon">📝</span> Notes
        </a></li>
        <li><a href="#" data-page="todos">
          <span class="icon">✅</span> To-Do
        </a></li>
        <li><a href="#" data-page="schedule">
          <span class="icon">📅</span> Schedule
        </a></li>
        <li><a href="#" data-page="msow">
          <span class="icon">📋</span> MSOW
        </a></li>
      </ul>
      <div style="padding:12px 16px;border-top:1px solid rgba(255,255,255,0.1)">
        <button id="sidebar-log-contact-btn" style="width:100%;padding:9px 12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px">
          <span>📞</span> Log Contact
        </button>
      </div>
      <div class="sidebar-footer">
        <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark theme">
          <span class="toggle-icon" id="theme-icon">☀</span>
          <span id="theme-label">Light Mode</span>
        </button>
        <!-- Edit mode toggle (shown when logged in) -->
        <button class="theme-toggle" id="edit-mode-btn" style="display:none" onclick="toggleEditMode()" title="Toggle edit mode">
          <span class="toggle-icon" id="edit-mode-icon">👁</span>
          <span id="edit-mode-label">View Mode</span>
        </button>
        <button class="theme-toggle" id="auth-login-btn" title="Sign in">
          <span class="toggle-icon">🔒</span>
          <span>Sign In</span>
        </button>
        <button class="theme-toggle" id="auth-logout-btn" onclick="logout()" title="Sign out" style="display:none">
          <span class="toggle-icon">🚪</span>
          <span id="auth-user-display">Sign Out</span>
        </button>
      </div>
    </nav>

    <main id="content">
      <div id="page-container">
        <!-- Pages load here -->
      </div>
    </main>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <div id="modal-header">
        <h2 id="modal-title"></h2>
        <button id="modal-close">&times;</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Auth modal (separate from the main modal) -->
  <div id="auth-modal-overlay" style="display:none;position:fixed;inset:0;background:#0008;z-index:999;align-items:center;justify-content:center">
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:28px 32px;width:340px;box-shadow:0 20px 60px #0006">
      <div style="font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px">🔒 Log In to Edit</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:20px">Enter your password to enable editing.</div>
      <form id="auth-form">
        <input type="password" id="auth-password-input" placeholder="Password"
          style="width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;margin-bottom:8px;box-sizing:border-box"/>
        <div id="auth-error" style="color:var(--red);font-size:12px;min-height:18px;margin-bottom:10px"></div>
        <div style="display:flex;gap:8px">
          <button type="submit" class="btn btn-primary" style="flex:1">Log In</button>
          <button type="button" id="auth-cancel-btn" class="btn btn-secondary">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/pages/report.js"></script>
  <script src="/js/pages/dashboard.js"></script>
  <script src="/js/pages/sites.js"></script>
  <script src="/js/pages/site-detail.js"></script>
  <script src="/js/pages/site-form.js"></script>
  <script src="/js/pages/unit-detail.js"></script>
  <script src="/js/pages/unit-form.js"></script>
  <script src="/js/pages/tickets.js"></script>
  <script src="/js/pages/issues.js"></script>
  <script src="/js/pages/service-tickets.js"></script>
  <script src="/js/pages/ticket-detail.js"></script>
  <script src="/js/pages/contacts.js"></script>
  <script src="/js/pages/notes.js"></script>
  <script src="/js/pages/contractor-detail.js"></script>
  <script src="/js/pages/campaign-detail.js"></script>
  <script src="/js/pages/todos.js"></script>
  <script src="/js/pages/schedule.js"></script>
  <script src="/js/pages/msow.js"></script>
  <script src="/js/app.js"></script>
  <script>
  document.getElementById('sidebar-log-contact-btn').addEventListener('click', async () => {
    closeMobileSidebar();
    const mid = 'global-log-contact-modal';
    document.getElementById(mid)?.remove();

    let sites = [];
    try { sites = await API.sites.list(); } catch {}

    const modal = document.createElement('div');
    modal.id = mid;
    modal.style.cssText = 'position:fixed;inset:0;background:#0009;z-index:2000;display:flex;align-items:center;justify-content:center;padding:24px';
    modal.innerHTML = `
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:500px;width:100%;box-shadow:0 20px 60px #0008">
        <div style="font-size:16px;font-weight:700;margin-bottom:16px">📞 Log Contact</div>
        <form id="global-log-form">
          <div class="form-group" style="margin-bottom:14px">
            <label>Site *</label>
            <select name="site_id" required style="width:100%;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px">
              <option value="">Select a site…</option>
              ${sites.map(s => `<option value="${s.id}">${s.name || s.project_name}</option>`).join('')}
            </select>
          </div>
          <div style="display:flex;gap:8px;margin-bottom:14px">
            ${[['meeting','👥 Meeting'],['phone_call','📞 Phone Call'],['email','✉️ Email'],['note','📝 Note']].map(([val,label]) =>
              `<label style="flex:1;cursor:pointer">
                <input type="radio" name="note_type" value="${val}" style="display:none" ${val==='phone_call'?'checked':''}>
                <div class="glc-type-btn" data-val="${val}" style="text-align:center;padding:7px 4px;border:1px solid var(--border);border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;${val==='phone_call'?'background:var(--accent);color:#fff;border-color:var(--accent)':''}">
                  ${label}
                </div>
              </label>`
            ).join('')}
          </div>
          <div class="form-group" style="margin-bottom:16px">
            <label>Details *</label>
            <textarea name="content" rows="4" required placeholder="What was discussed or decided…"></textarea>
          </div>
          <div style="display:flex;justify-content:flex-end;gap:8px">
            <button type="button" class="btn btn-secondary" id="glc-cancel">Cancel</button>
            <button type="submit" class="btn btn-primary">Log It</button>
          </div>
        </form>
      </div>`;
    document.body.appendChild(modal);

    modal.querySelectorAll('.glc-type-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        modal.querySelectorAll('.glc-type-btn').forEach(b => { b.style.background=''; b.style.color=''; b.style.borderColor=''; });
        btn.style.background='var(--accent)'; btn.style.color='#fff'; btn.style.borderColor='var(--accent)';
        modal.querySelector(`input[value="${btn.dataset.val}"]`).checked = true;
      });
    });

    document.getElementById('glc-cancel').onclick = () => modal.remove();
    modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });

    modal.querySelector('#global-log-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target).entries());
      Object.keys(data).forEach(k => { if (data[k]==='') data[k]=null; });
      const siteId = data.site_id;
      delete data.site_id;
      try {
        await API.notes.createSite(siteId, data);
        modal.remove();
        toast('Contact logged');
      } catch (err) { toast('Error: ' + err.message, 'error'); }
    });
  });
  </script>
</body>
</html>
